name: Deslicer Change
description: Install the Deslicer CLI from signed releases and run deslicer change commands.
author: Deslicer
branding:
  icon: git-branch
  color: blue

inputs:
  version:
    description: 'CLI version: "v1" (floating), "v1.2.3" (immutable), or a 40-char SHA. Default "v1".'
    required: false
    default: v1
  version-sha:
    description: Optional 40-char SHA. If set, overrides version and pins to an immutable commit.
    required: false
  command:
    description: deslicer change subcommand (e.g. plan, approve, status, show, reject).
    required: true
  command-args:
    description: Additional arguments passed to deslicer change.
    required: false
    default: ''
  observer-api-url:
    description: Optional. Sets $OBSERVER_API_URL for the CLI.
    required: false

outputs:
  cli-version:
    description: Semver of the deslicer binary that was installed.
  cli-path:
    description: Absolute path to the installed deslicer binary.

runs:
  using: node24
  main: dist/index.js
