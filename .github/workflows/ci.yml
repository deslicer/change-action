name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd0f4d08432af # v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dist check
        run: npm run dist-check

      - name: Verify committed dist matches build
        run: |
          git diff --exit-code dist/ || (
            echo "::error::dist/ is out of date — run npm run build and commit dist/"
            exit 1
          )
