name: E2E

on:
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install-smoke:
    name: Install smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v6

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'

      - name: Install cosign (Linux)
        if: runner.os == 'Linux'
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Install cosign (macOS)
        if: runner.os == 'macOS'
        run: brew install cosign

      - name: Install cosign (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id Sigstore.Cosign --accept-package-agreements --accept-source-agreements
          $cosignDir = Join-Path $env:LOCALAPPDATA 'Microsoft\WinGet\Links'
          if (Test-Path $cosignDir) {
            echo "$cosignDir" >> $env:GITHUB_PATH
          }

      - name: Build action bundle
        shell: bash
        run: npm ci && npm run build

      - name: Install deslicer via action
        uses: ./
        with:
          version: v1.0.0

      - name: Assert deslicer version
        shell: bash
        run: deslicer --version
