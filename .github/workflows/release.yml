name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver tag without v prefix (e.g. 1.0.0)
        required: true
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd0f4d08432af # v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build dist bundle
        run: npm run build

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/index.js
            dist/index.js.map
            dist/licenses.txt

      - name: Move floating v1 tag
        if: startsWith(steps.tag.outputs.name, 'v1.')
        run: |
          git tag -f v1
          git push origin refs/tags/v1 --force
